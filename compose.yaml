services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    networks:
      - quiz-network
    depends_on:
      database:
        condition: service_healthy
    restart: always

  database:
    image: postgres:15-alpine
    container_name: quiz-database
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - quiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_quiz -d quiz_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    networks:
      - quiz-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - API_URL=http://backend:8000

volumes:
  pgdata:

networks:
  quiz-network:
    driver: bridge
